server:
  port: 8082

spring:
  application:
    name: enrollment-service
  datasource:
    url: jdbc:mysql://localhost:3308/enrollment_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: enrollment_user
    password: enrollment_pass
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

catalog-service:
  url: http://localhost:8081

logging:
  level:
    com.zjsu.gjh.enrollment: DEBUG
    org.hibernate.SQL: DEBUG